# Application stack — connects to the shared PostGIS infrastructure stack
# running separately on the NAS (see docs/architecture/docker-infra-compose.yml).
#
# Required .env vars:
#   DATABASE_HOST, DATABASE_PORT, POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB,
#   GEOSERVER_ADMIN_PASSWORD, MEDIA_BASE_URL
version: '3.9'
services:
  ancientdata:
    image: rinsedev/ancientdata
    restart: on-failure
    ports:
      - 8080:8080
    volumes:
      - /volume1/docker/ancientdata/media:/app/media:rw
      - /volume1/docker/ancientdata/secrets:/app/secrets:ro
    environment:
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_USER=${POSTGRES_USER}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_NAME=${POSTGRES_DB}
      - DATABASE_PORT=${DATABASE_PORT:-2665}
      - MEDIA_STORAGE_PATH=/app/media
      - MEDIA_BASE_URL=${MEDIA_BASE_URL:-http://localhost:8080/api/media/files}
      - GDRIVE_BACKUP_ENABLED=${GDRIVE_BACKUP_ENABLED:-false}
      - GDRIVE_SERVICE_ACCOUNT_KEY_PATH=${GDRIVE_SERVICE_ACCOUNT_KEY_PATH:-/app/secrets/gdrive-sa-key.json}
      - GDRIVE_FOLDER_ID=${GDRIVE_FOLDER_ID:-}
      - GDRIVE_SYNC_CRON=${GDRIVE_SYNC_CRON:-0 0 3 * * SUN}

  geoserver:
    container_name: GeoServer
    image: kartoza/geoserver:2.24.1
    environment:
      - GEOSERVER_ADMIN_PASSWORD=${GEOSERVER_ADMIN_PASSWORD}
      - GEOSERVER_DATA_DIR=/opt/geoserver/data_dir
    volumes:
      - /volume1/docker/ancientdata/geoserver:/opt/geoserver/data_dir:rw
    ports:
      - 2675:8080
    restart: on-failure
