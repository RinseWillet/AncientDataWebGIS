version: '3.9'
services:
  ancientdata:
    image: rinsedev/ancientdata
    restart: on-failure
    depends_on:
      - db
    ports:
      - 8080:8080
    environment:
      - DATABASE_HOST=db
      - DATABASE_USER=root
      - DATABASE_PASSWORD=Asia133BCE!
      - DATABASE_NAME=webGIS_DB
      - DATABASE_PORT=2665

  db:
    container_name: PostGIS
    image: postgis/postgis:16-3.4
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "webGIS_DB", "-U", "root" ]
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Asia133BCE!
      POSTGRES_DB: webGIS_DB
    volumes:
      - /volume1/docker/postgis_pgadmin_stack/postgis:/var/lib/postgresql/data:rw
    ports:
      - 2665:5432
    restart: on-failure

  geoserver:
    container_name: GeoServer
    image: kartoza/geoserver:2.24.1
    environment:
      - GEOSERVER_ADMIN_PASSWORD=Asia133BCE!
      - GEOSERVER_DATA_DIR=/opt/geoserver/data_dir
    volumes:
      - /volume1/docker/postgis_pgadmin_stack/geoserver:/opt/geoserver/data_dir:rw
    ports:
      - 2675:8080
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    container_name: pgAdmin
    image: dpage/pgadmin4:8.14
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5050
    environment:
      PGADMIN_DEFAULT_EMAIL: r.willet@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Asia133BCE!
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - 2660:5050
    volumes:
      - /volume1/docker/postgis_pgadmin_stack/postgisadmin:/var/lib/pgadmin:rw
    restart: on-failure
