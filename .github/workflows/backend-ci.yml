name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check no log files are tracked
        run: |
          if git ls-files --error-unmatch 'logs/*.log' 'logs/*.gz' 2>/dev/null; then
            echo "ERROR: log files are tracked by git. Run 'git rm --cached <file>' to untrack them."
            exit 1
          fi
          echo "Log file check passed."

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Build application
        run: ./gradlew --no-daemon build -x test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

