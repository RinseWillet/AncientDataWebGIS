services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: webGIS_DB
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d webGIS_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  ancientdata:
    build:
      context: ../../
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/webGIS_DB
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: YW5jaWVudGRhdGEtY2ktc21va2UtdGVzdC1zZWNyZXQtMzItY2hhcnM=
      JWT_EXPIRATION: "86400000"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080

