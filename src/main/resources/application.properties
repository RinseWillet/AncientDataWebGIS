management.endpoints.web.exposure.include=env, info, health

# Load local .env when present (works in IDE/CLI without extra plugins)
spring.config.import=optional:file:.env[.properties]

# database configuration
spring.application.name=ancientdata

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# increase upload and download size files to 50 mb
spring.servlet.multipart.max-file-size = 50MB
spring.servlet.multipart.max-request-size = 50MB

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=1

# logging file configuration
logging.file.name=logs/ancientdata.log

logging.level.org.flywaydb=DEBUG

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION:0}

# CORS configuration (comma-separated for multiple origins)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

